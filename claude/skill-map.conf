# ~/.dotfiles/claude/skill-map.conf
#
# Maps detect-stack.sh output signals to skill names.
# inject-context.sh reads this file and emits a <required-skills> block
# alongside <repo-context> on the first prompt of each session.
#
# FORMAT
# ------
# One rule per line:
#
#   <signal>   <skill> [<skill2> ...]
#
# Signal is either a bare stack name (js, python) or a compound
# stack+extra (js+react, js+next) derived from the extras parenthetical
# in detect-stack.sh output, e.g.:
#
#   "js: yes at frontend/ (typescript, react, next) [pnpm]"
#    └─ signals: js  js+typescript  js+react  js+next
#
# All matching rules are applied; skills are deduplicated in first-seen
# order. Comments and blank lines are ignored.
#
# EXTENDING
# ---------
# To add a skill to an existing stack: add a rule here and a
# Skill(<name>) entry in the allow list in settings.json.
#
# To add a new stack: follow the pattern in detect-stack.sh and _lib.sh,
# then add rules here.
#
# IMPLIED FRAMEWORK SKILLS
# ------------------------
# next always implies react (Next.js IS React; react never appears as a
# direct dep when next is the only framework signal).
# nuxt always implies vue (Nuxt bundles Vue; vue is rarely a direct dep).
# Both rules carry the base skill so the project is covered even if the
# bare framework signal fires without its companion.
#
# NEVER AUTO-LOAD (invoke manually when the task warrants it)
# -----------------------------------------------------------
# bash-patterns          — only relevant for shell script work
# engineering-fundamentals — meta-skill, invoke for architecture sessions
# evals                  — project-specific evaluation runs
# markdown-report        — output format, invoked by commands that need it
# security-patterns      — invoke explicitly for security audits
# test-patterns          — invoke explicitly for test-focused work
# wcag-audit             — invoke explicitly for accessibility audits

# JavaScript / TypeScript base
js                  javascript-patterns
js+typescript       typescript-patterns

# React ecosystem — next carries react-patterns because Next IS React
js+react            react-patterns
js+next             react-patterns next-app-router-patterns

# Vue ecosystem — nuxt carries vue-patterns because Nuxt bundles Vue
# and vue rarely appears as a direct package.json dep in Nuxt projects
js+vue              vue-patterns
js+nuxt             vue-patterns nuxt-patterns

# CSS / styling
js+tailwindcss      tailwind-patterns

# Python ecosystem
python              python-patterns
python+django       django-patterns

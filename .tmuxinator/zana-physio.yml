name: ZanaPhysio
root: ~/Projects/ZanaKadric/Code/ZanaPhysio/
pre_window: source ./backend/.venv/bin/activate
enable_pane_titles: true

windows:
  - editor:
      layout: main-horizontal
      panes:
        - nvim:
            - nvim
        - root:
            - clear
        - frontend:
            - clear
            - cd ./frontend
            - clear
        - backend:
            - clear
            - cd ./backend
            - clear
  - claude:
      panes:
        - claude
  - localhost:
      layout: even-horizontal
      panes:
        - backend:
            - cd backend
            - clear
            - python manage.py runserver
        - frontend:
            - cd frontend
            - clear
            - npm run dev
  - tests:
      layout: even-horizontal
      panes:
        - backend:
            - cd backend
            - clear
            - make test-unit-watch
        - frontend:
            - cd frontend
            - clear
            - npm run test:watch

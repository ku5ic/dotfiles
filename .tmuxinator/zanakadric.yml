name: zanakadriic
root: ~/Projects/ZanaKadric/Code/zanakadric/
pre_window: source ./backend/.venv/bin/activate
enable_pane_titles: true

windows:
  - editor:
      layout: main-horizontal
      panes:
        - nvim:
            - nvim
        - terminal:
            - clear
  - terminal:
      layout: even-vertical
      panes:

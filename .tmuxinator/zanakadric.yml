name: zanakadric
root: ~/Projects/ZanaKadric/Code/zanakadric/
pre_window: source ./backend/.venv/bin/activate
enable_pane_titles: true

windows:
  - editor:
      layout: main-horizontal
      panes:
        - nvim:
            - nvim
        - terminal:
            - clear
  - claude:
      panes:
        - claude
  - localhost:
      layout: even-horizontal
      panes:
        - backend:
            - cd backend
            - clear
            - python manage.py runserver
        - frontend:
            - cd frontend
            - clear
            - npm run dev
  - tests:
      layout: even-horizontal
      panes:
        - backend:
            - cd backend
            - clear
            - make test
        - frontend:
            - cd frontend
            - clear
            - npm run test

name: <%= @settings["name"] %>
root: <%= @settings["workspace"] %>
pre_window: source ./backend/.venv/bin/activate
enable_pane_titles: true

windows:
  - editor:
      layout: main-horizontal
      panes:
        - nvim:
            - nvim
        - terminal:
            -
  - terminal:
      layout: even-vertical
      panes:
        - backend:
            - cd backend
        - frontend:
            - cd frontend

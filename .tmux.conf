# Login shell. Forced to Homebrew zsh so panes inherit the same environment
# as the desktop terminal regardless of /etc/shells ordering.
set-option -g default-shell /opt/homebrew/bin/zsh
set-option -g default-command /opt/homebrew/bin/zsh


# Terminal capabilities
# tmux-256color is the canonical modern terminfo; keep the legacy Tc override
# alongside the standard RGB capability so apps probing either see truecolor.
set-option -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -as terminal-features ",*:RGB"

# OSC 8 hyperlinks pass through to the host terminal (WezTerm renders them as
# clickable links).
set -as terminal-features ",*:hyperlinks"

# Sixel image passthrough so terminals that render sixel (WezTerm, Ghostty,
# kitty) can show images inside tmux panes.
set -as terminal-features ",*:sixel"

# Kitty graphics protocol passthrough. Higher-fidelity than sixel and used by
# image.nvim, chafa --format=kitty, and similar. Requires allow-passthrough on.
set -as terminal-features ",*:graphics"

# Undercurl + coloured underscores. The escape sequences are non-standard so
# the capability has to be advertised manually for LSP/diagnostics styling to
# survive the tmux layer.
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Extended (CSI-u) keys are off intentionally. Re-enabling broke something
# previously; revisit before flipping. The features advert is preserved so
# apps can still ask for extkeys when this gets turned back on.
set -s extended-keys off #!important
set -as terminal-features 'xterm*:extkeys'
set-window-option -g xterm-keys on

# Let image escape sequences (sixel, kitty graphics) reach the host terminal.
# Tradeoff: untrusted output piped through tmux can emit arbitrary escape
# sequences. Acceptable for an interactive dev session, not for log piping.
set-option -g allow-passthrough on

# Forward focus-in/out events so Neovim's autoread and similar features fire.
set-option -g focus-events on


# General behaviour
set -g base-index 1
setw -g pane-base-index 1
set-option -g history-limit 100000
set-option -g set-clipboard on
set -g mouse on

# Silence every form of bell/activity notification. Status-bar flashing on a
# busy build pane is noise.
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none


# Plugins (managed by tpm; install with prefix + I)
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'fcsonline/tmux-thumbs'

# tmux-thumbs: prefix + Space hints over visible URLs/paths/hashes/IPs.
# Lowercase hint copies via pbcopy; uppercase hint opens via macOS `open`
# (URLs to default browser, files to associated app).
set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-upcase-command "$HOME/.dotfiles/scripts/tmux_thumb_upcase_handler.sh {}"


# Catppuccin theme. Inputs that the plugin reads at source time go before the
# `run`; status-right below uses variables emitted by the plugin, so it must
# come after.
set -g @catppuccin_window_status_style "rounded"
set -gq @catppuccin_window_text " #W"
set -gq @catppuccin_window_number "#I"
set -gq @catppuccin_window_current_text " #W"
set -gq @catppuccin_window_current_number "#I"
set -g @catppuccin_date_time_text " %d/%m/%y %H:%M"
run ~/.tmux/plugins/tmux/catppuccin.tmux
set -g @catppuccin_status_background "#242638"
set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha


# Status bar
set -g status on
set -g status-interval 1
set -g status-justify left
set -g status-keys vi
set -g status-position bottom
set -g status-style 'bg=terminal'
set -g status-left ""
set -g status-right-length 100
set -gF status-right "#{@catppuccin_status_directory}#{@catppuccin_status_session}#{@catppuccin_status_host}#{E:@catppuccin_status_date_time}"

# consistent management of the main pane across layouts. The main pane is the one that
setw -g main-pane-width 50%
setw -g main-pane-height 75%


# Pane borders. Empty format with status row produces a thin coloured bar at
# the bottom of each pane that doubles as the active-pane indicator.
set -g pane-border-format ""
set -g pane-border-status bottom
set -g pane-border-style fg=colour0
set -g pane-active-border-style fg=colour0


# Prefix and mode. C-a is closer than C-b on a US keyboard; double-tap sends
# the literal C-a through to the underlying app.
unbind-key C-b
set -g prefix C-a
bind a send-prefix
set -g mode-keys vi


# Window and pane bindings
bind-key C-a last-window
bind-key p paste-buffer

# Splits and new windows inherit the active pane's working directory; the
# tmux defaults (prefix + %, ", c) start in $HOME instead.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# prefix + C-s: fzf popup over other live sessions; pick one to switch.
bind C-s display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\\$\" | fzf --reverse | xargs tmux switch-client -t"


# Copy mode. Strip ANSI colour codes before sending to the macOS clipboard so
# pasted text isn't littered with escape sequences.
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "sed 's/\x1b\[[0-9;]*m//g' | pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "sed 's/\x1b\[[0-9;]*m//g' | pbcopy"


# vim-tmux-navigator: pass C-hjkl + C-\ to vim/nvim/fzf when the pane runs
# one of them, otherwise move between tmux panes. Detection inspects the
# pane tty's process tree.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n "C-\\" if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi "C-\\" select-pane -l


# tpm init. Must remain the last line.
run '/opt/homebrew/opt/tpm/share/tpm/tpm'
